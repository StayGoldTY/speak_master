name: speak_master
description: "声临其境 - English Pronunciation Learning App"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  flutter_web_plugins:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1
  go_router: ^14.8.1
  shared_preferences: ^2.5.3
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  record: ^5.2.1
  audioplayers: ^6.4.0
  flutter_tts: ^4.2.0
  speech_to_text: ^7.0.0
  fl_chart: ^0.70.2
  lottie: ^3.3.1
  percent_indicator: ^4.2.3
  flutter_animate: ^4.5.2
  supabase_flutter: ^2.9.0
  google_mobile_ads: ^5.3.0
  in_app_purchase: ^3.2.0
  intl: ^0.20.2
  uuid: ^4.5.1
  path_provider: ^2.1.5
  url_launcher: ^6.3.1
  share_plus: ^10.1.4
  permission_handler: ^11.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.4.15

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/audio/
    - assets/animations/
